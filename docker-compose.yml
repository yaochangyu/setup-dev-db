services:
  mssqlserver2019:
    image: mcr.microsoft.com/mssql/server:2019-CU28-ubuntu-20.04
    container_name: mssqlserver2019
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=123456
      - MSSQL_PID=Developer
    ports:
      - "14333:1433"
    volumes:
      - ./data/mssqlserver2019:/var/opt/mssql
    restart: always

  postgresql16:
    image: postgres:16.4-alpine
    container_name: postgresql16
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=123456
      - POSTGRES_DB=mydb
    ports:
      - "5433:5432"
    volumes:
      - ./data/postgresql16:/var/lib/postgresql/data
    restart: always

  redis7:
    image: redis:7.2.5-alpine
    container_name: redis7
    command: redis-server --requirepass 123456
    ports:
      - "6380:6379"
    volumes:
      - ./data/redis7:/data
    restart: always
